<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AsmarA Luxury Handmade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A059;       /* Глубокий благородный золотой */
            --dark: #121212;       /* Почти черный для контраста */
            --bg-color: #F8F8F8;   /* Мягкий светло-серый фон сайта */
            --card-bg: #FFFFFF;    /* Чисто белый для карточек (идеальная читаемость) */
            --text-main: #1A1A1A;  /* Основной текст */
            --text-muted: #7A7A7A; /* Второстепенный текст */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 100px; /* Место под нижнее меню */
        }

        /* --- HEADER --- */
        .header {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            text-align: center;
            padding: 20px 15px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--dark);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* --- CATALOG GRID --- */
        .catalog {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px 15px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
        }

        .product-img-box {
            width: 100%;
            aspect-ratio: 4/5;
            background: #EFEFEF; /* Серый фон пока грузится фото */
            position: relative;
        }

        .product-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Контейнер с текстом: идеальный контраст, белый фон, черный текст */
        .product-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .product-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .btn-add {
            width: 100%;
            background: var(--dark);
            color: #FFF;
            border: none;
            padding: 10px 0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add:active {
            background: var(--gold);
        }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 65px;
            background: var(--dark);
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            font-size: 10px;
            font-weight: 500;
            position: relative;
            cursor: pointer;
            width: 50%;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: 25%;
            background: var(--gold);
            color: #FFF;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            border: 2px solid var(--dark);
            display: none;
        }

        /* --- BOTTOM SHEET (CART) --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            z-index: 1500;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .cart-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-radius: 24px 24px 0 0;
            padding: 24px 20px;
            z-index: 2000;
            transition: bottom 0.4s cubic-bezier(0.32, 1, 0.23, 1);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .cart-sheet.open {
            bottom: 0;
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: #E0E0E0;
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .cart-title {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
            color: var(--dark);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .cart-item-info {
            display: flex;
            flex-direction: column;
        }
        .cart-item-name {
            font-size: 14px;
            font-weight: 500;
        }
        .cart-item-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            margin-top: 4px;
        }

        .cart-total {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            background: #FAFAFA;
            color: var(--text-main);
            outline: none;
        }
        .form-input:focus {
            border-color: var(--gold);
        }

        .btn-order {
            background: var(--gold);
            color: #FFF;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ASMARA</div>
        <div class="subtitle">Handmade Premium Leather</div>
    </div>

    <div class="catalog" id="catalog-container"></div>

    <div class="bottom-nav">
        <div class="nav-item active" id="btn-catalog" onclick="closeCart()">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>КАТАЛОГ</span>
        </div>
        <div class="nav-item" id="btn-cart" onclick="openCart()">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <span>КОРЗИНА</span>
            <div class="cart-badge" id="cart-badge">0</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeCart()"></div>
    <div class="cart-sheet" id="cart-sheet">
        <div class="sheet-handle"></div>
        <div class="cart-title">ВАШ ЗАКАЗ</div>
        
        <div class="cart-items" id="cart-items-container">
            </div>

        <div class="cart-total" id="cart-total-display" style="display: none;">
            <span>Итого:</span>
            <span id="total-price" style="color: var(--gold);">0 ₽</span>
        </div>

        <div id="checkout-form" style="display: none;">
            <input type="text" id="userName" class="form-input" placeholder="Ваше Имя (как к вам обращаться?)">
            <input type="tel" id="userPhone" class="form-input" placeholder="Номер телефона / Telegram">
            <button class="btn-order" onclick="sendOrder()">ОФОРМИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        // ==========================================
        // БАЗА ТОВАРОВ (Меняйте фото и цены только тут!)
        // ==========================================
        const products = [
            {
                id: "item1",
                name: "Сумка 'Milano Black'",
                price: 15000,
                image: "./assets/bag1.jpg.png" 
            },
            {
                id: "item2",
                name: "Сумка 'Dubai Gold'",
                price: 18500,
                image: "./assets/bag2.jpg.png" 
            },
            {
                id: "item3",
                name: "Картхолдер Classic",
                price: 3500,
                image: "./assets/card1.jpg.png"
            },
            {
                id: "item4",
                name: "Картхолдер Premium",
                price: 4500,
                image: "./assets/card2.jpg.png"
            }
        ];

        let cart = [];

        // 1. Отрисовка каталога на странице
        function renderCatalog() {
            const container = document.getElementById('catalog-container');
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-img-box">
                        <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x400?text=Нет+фото'">
                    </div>
                    <div class="product-info">
                        <div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">${product.price.toLocaleString('ru-RU')} ₽</div>
                        </div>
                        <button class="btn-add" onclick="addToCart('${product.id}')">В корзину</button>
                    </div>
                </div>
            `).join('');
        }

        // 2. Добавление в корзину
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                cart.push(product);
                updateBadge();
                tg.HapticFeedback.impactOccurred('light'); // Вибрация (как в люкс приложениях)
            }
        }

        // 3. Обновление счетчика на иконке корзины
        function updateBadge() {
            const badge = document.getElementById('cart-badge');
            if (cart.length > 0) {
                badge.style.display = 'block';
                badge.innerText = cart.length;
            } else {
                badge.style.display = 'none';
            }
        }

        // 4. Открытие и закрытие корзины
        function openCart() {
            document.getElementById('cart-sheet').classList.add('open');
            document.getElementById('overlay').classList.add('active');
            
            document.getElementById('btn-catalog').classList.remove('active');
            document.getElementById('btn-cart').classList.add('active');
            
            renderCartItems();
        }

        function closeCart() {
            document.getElementById('cart-sheet').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
            
            document.getElementById('btn-cart').classList.remove('active');
            document.getElementById('btn-catalog').classList.add('active');
        }

        // 5. Отрисовка товаров внутри корзины
        function renderCartItems() {
            const container = document.getElementById('cart-items-container');
            const form = document.getElementById('checkout-form');
            const totalDisplay = document.getElementById('cart-total-display');
            const priceText = document.getElementById('total-price');

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999; margin-top: 20px;">Ваша корзина пуста</p>';
                form.style.display = 'none';
                totalDisplay.style.display = 'none';
                return;
            }

            // Группируем одинаковые товары или просто выводим списком
            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item-row">
                    <div class="cart-item-info">
                        <span class="cart-item-name">${item.name}</span>
                        <span class="cart-item-price">${item.price.toLocaleString('ru-RU')} ₽</span>
                    </div>
                    <button onclick="removeFromCart(${index})" style="background:none; border:none; color:#999; font-size:20px; padding:0 10px;">×</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            priceText.innerText = `${total.toLocaleString('ru-RU')} ₽`;
            
            form.style.display = 'block';
            totalDisplay.style.display = 'flex';
        }

        // 6. Удаление товара из корзины
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateBadge();
            renderCartItems();
            tg.HapticFeedback.impactOccurred('light');
        }

        // 7. Отправка заказа в бота
        function sendOrder() {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();

            if(!name || !phone) {
                tg.showAlert("Пожалуйста, заполните Ваше Имя и Телефон для связи.");
                return;
            }

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            // Формируем данные для Python бота
            const orderData = {
                customer_name: name,
                customer_phone: phone,
                items: cart.map(i => i.name),
                total_sum: total
            };

            // Отправляем JSON строку в бота (ловится в message.web_app_data.data)
            tg.sendData(JSON.stringify(orderData));
        }

        // Запуск при открытии
        renderCatalog();

    </script>
</body>
</html>
