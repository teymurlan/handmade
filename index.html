<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AsmarA Luxury</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #D4AF37; /* Золото */
            --bg: #ffffff;
            --text: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* Top Bar */
        .top-bar {
            position: sticky;
            top: 0;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 22px;
            letter-spacing: 3px;
            font-weight: 700;
        }

        /* Search Bar Luxury Style */
        .search-container {
            padding: 10px 20px;
        }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-family: inherit;
            background: #fcfcfc;
            box-sizing: border-box;
            outline: none;
        }

        /* Catalog Grid */
        .catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            padding-bottom: 120px; /* Отступ под меню */
        }

        .product-card {
            position: relative;
            background: #fff;
            transition: transform 0.3s ease;
        }

        .product-img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1.2;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: white;
            padding: 4px 8px;
            font-size: 8px;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .product-info {
            padding: 12px 5px;
        }

        .product-title {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-price {
            font-weight: 600;
            color: var(--accent);
            font-size: 15px;
        }

        .add-to-cart-small {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* Bottom Navigation Menu */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 65px;
            background: #1a1a1a; /* Темный люкс */
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .nav-btn {
            color: #888;
            text-decoration: none;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .nav-btn.active { color: var(--accent); }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        /* Cart Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 25px;
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.32, 1, 0.23, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .bottom-sheet.show { bottom: 0; }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1500;
        }

        .checkout-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
        }

        .btn-order {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">ASMARA</div>
        <div style="font-size: 12px; font-weight: 300; letter-spacing: 1px;">MILANO</div>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Поиск аксессуаров...">
    </div>

    <div class="catalog" id="catalog">
        <div class="product-card">
            <div class="product-img-wrapper">
                <img src="./assets/bag1.jpg.png" alt="Сумка">
                <div class="badge">Limited</div>
                <div class="add-to-cart-small" onclick="addToCart('Bag Luxury', 15000)">+</div>
            </div>
            <div class="product-info">
                <div class="product-title">Luxury Shoulder Bag</div>
                <div class="product-price">15 000 ₽</div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-img-wrapper">
                <img src="./assets/card1.jpg.png" alt="Картхолдер">
                <div class="add-to-cart-small" onclick="addToCart('Cardholder Gold', 3500)">+</div>
            </div>
            <div class="product-info">
                <div class="product-title">Cardholder Gold</div>
                <div class="product-price">3 500 ₽</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active" onclick="toggleSheet(false)">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>КАТАЛОГ</span>
        </div>
        <div class="nav-btn" onclick="toggleSheet(true)">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <span>КОРЗИНА</span>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSheet(false)"></div>
    <div class="bottom-sheet" id="cartSheet">
        <div style="width: 40px; height: 4px; background: #eee; border-radius: 2px; margin: 0 auto 20px;"></div>
        <h2 style="font-family: 'Cinzel'; text-align: center;">Ваш Заказ</h2>
        <div id="cartItems"></div>
        <hr style="border: 0.5px solid #eee; margin: 20px 0;">
        <input type="text" id="userName" class="checkout-input" placeholder="Ваше Имя">
        <input type="tel" id="userPhone" class="checkout-input" placeholder="Номер телефона">
        <button class="btn-order" onclick="sendOrder()">Оформить заказ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        let cart = [];

        function toggleSheet(show) {
            const sheet = document.getElementById('cartSheet');
            const overlay = document.getElementById('overlay');
            if(show) {
                sheet.classList.add('show');
                overlay.style.display = 'block';
                renderCart();
            } else {
                sheet.classList.remove('show');
                overlay.style.display = 'none';
            }
        }

        function addToCart(name, price) {
            cart.push({name, price});
            tg.HapticFeedback.notificationOccurred('success');
            alert('Добавлено в корзину!');
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999;">Корзина пуста</p>';
                return;
            }
            container.innerHTML = cart.map((item, index) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${item.name}</span>
                    <b>${item.price} ₽</b>
                </div>
            `).join('');
        }

        function sendOrder() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;

            if(!name || !phone || cart.length === 0) {
                tg.showPopup({message: "Пожалуйста, заполните данные и добавьте товар."});
                return;
            }

            const data = {
                items: cart,
                total: cart.reduce((sum, item) => sum + item.price, 0),
                customer: name,
                phone: phone
            };

            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
